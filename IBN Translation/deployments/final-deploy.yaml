networks:
  public_net:
    driver: bridge
    name: demo-oai-public-net
    ipam:
      config:
      - subnet: 192.168.70.128/26
    driver_opts:
      com.docker.network.bridge.name: demo-oai
services:
  mysql:
    container_name: mysql
    image: mysql:9.6.0
    volumes:
    - ./database/oai_db2.sql:/docker-entrypoint-initdb.d/oai_db.sql
    - ./healthscripts/mysql-healthcheck2.sh:/tmp/mysql-healthcheck.sh
    environment:
    - TZ=Europe/Paris
    - MYSQL_DATABASE=oai_db
    - MYSQL_USER=test
    - MYSQL_PASSWORD=test
    - MYSQL_ROOT_PASSWORD=linux
    healthcheck:
      test: /bin/bash -c "/tmp/mysql-healthcheck.sh"
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      public_net: null
  oai-udr:
    container_name: oai-udr
    image: oaisoftwarealliance/oai-udr:develop
    expose:
    - 80/tcp
    - 8080/tcp
    volumes:
    - ./basic_nrf_config.yaml:/openair-udr/etc/config.yaml
    environment:
    - TZ=Europe/Paris
    depends_on:
    - mysql
    - oai-nrf
    networks:
      public_net: null
  oai-udm:
    container_name: oai-udm
    image: oaisoftwarealliance/oai-udm:develop
    expose:
    - 80/tcp
    - 8080/tcp
    volumes:
    - ./basic_nrf_config.yaml:/openair-udm/etc/config.yaml
    environment:
    - TZ=Europe/Paris
    depends_on:
    - oai-nrf
    networks:
      public_net: null
  oai-ausf:
    container_name: oai-ausf
    image: oaisoftwarealliance/oai-ausf:develop
    expose:
    - 80/tcp
    - 8080/tcp
    volumes:
    - ./basic_nrf_config.yaml:/openair-ausf/etc/config.yaml
    environment:
    - TZ=Europe/Paris
    depends_on:
    - oai-nrf
    networks:
      public_net: null
  oai-nrf:
    container_name: oai-nrf
    image: oaisoftwarealliance/oai-nrf:develop
    expose:
    - 80/tcp
    - 8080/tcp
    volumes:
    - ./basic_nrf_config.yaml:/openair-nrf/etc/config.yaml
    environment:
    - TZ=Europe/Paris
    networks:
      public_net: null
  oai-amf:
    container_name: oai-amf
    image: oaisoftwarealliance/oai-amf:develop
    expose:
    - 80/tcp
    - 8080/tcp
    - 38412/sctp
    volumes:
    - ./basic_nrf_config.yaml:/openair-amf/etc/config.yaml
    environment:
    - TZ=Europe/Paris
    depends_on:
    - oai-nrf
    networks:
      public_net: null
  oai-smf:
    container_name: oai-smf
    image: oaisoftwarealliance/oai-smf:develop
    expose:
    - 80/tcp
    - 8080/tcp
    - 8805/udp
    volumes:
    - ./basic_nrf_config.yaml:/openair-smf/etc/config.yaml
    environment:
    - TZ=Europe/Paris
    depends_on:
    - oai-nrf
    networks:
      public_net: null
  oai-upf:
    container_name: oai-upf
    image: oaisoftwarealliance/oai-upf:develop
    expose:
    - 2152/udp
    - 8805/udp
    volumes:
    - ./basic_nrf_config.yaml:/openair-upf/etc/config.yaml
    environment:
    - TZ=Europe/Paris
    depends_on:
    - oai-nrf
    cap_add:
    - NET_ADMIN
    - SYS_ADMIN
    cap_drop:
    - ALL
    privileged: true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 800M
    networks:
      public_net: null
  oai-ext-dn:
    privileged: true
    init: true
    container_name: oai-ext-dn
    image: oaisoftwarealliance/trf-gen-cn5g:latest
    environment:
    - UPF_FQDN=oai-upf
    - UE_NETWORK=12.1.1.0/24
    - USE_FQDN=yes
    healthcheck:
      test: /bin/bash -c "ip r | grep 12.1.1"
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      public_net: null
  owncast:
    container_name: owncast
    image: gabekangas/owncast:latest
    restart: always
    cap_add:
    - NET_ADMIN
    ports:
    - 8081:8080
    - 1935:1935
    networks:
      public_net: null
  gnbsim:
    container_name: gnbsim
    image: gnbsim:latest
    privileged: true
    environment:
    - MCC=208
    - MNC=95
    - GNBID=1
    - TAC=0x00a000
    - SST=222
    - SD=00007b
    - PagingDRX=v32
    - RANUENGAPID=0
    - IMEISV=35609204079514
    - MSIN=0000000031
    - RoutingIndicator=1234
    - ProtectionScheme=null
    - KEY=0C0A34601D4F07677303652C0462535B
    - OPc=63bfa50ee6523365ff14c1f45f88737d
    - DNN=default
    - URL=http://www.asnt.org:8080/
    - NRCellID=1
    - USE_FQDN=yes
    - AMF_FQDN=oai-amf
    - NGAPPeerAddr=0.0.0.0
    - GTPuLocalAddr=0.0.0.0
    - GTPuIFname=eth0
    networks:
      public_net: null
    healthcheck:
      test: /bin/bash -c "ip address show dev gtp-gnb"
      interval: 10s
      timeout: 5s
      retries: 5
